openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Intent Engine API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead fetching, scoring, and management
  - name: stats
    description: Dashboard statistics
  - name: keywords
    description: Intent keyword configuration
  - name: voice
    description: Voice agent configuration, call management, and telephony

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: Fetch and score leads
      description: Fetch leads from all connectors, score them, and return filtered results
      parameters:
        - name: min_score
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: subreddit
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of scored leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /leads/refresh:
    post:
      operationId: refreshLeads
      tags: [leads]
      summary: Force-refresh leads
      description: Invalidates the lead cache and triggers a fresh fetch from all connectors
      responses:
        "200":
          description: Refreshed leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /leads/stats:
    get:
      operationId: getLeadsStats
      tags: [stats]
      summary: Get lead statistics
      description: Summary statistics for the intent engine dashboard
      responses:
        "200":
          description: Lead statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsStats"

  /leads/saved:
    get:
      operationId: getSavedLeads
      tags: [leads]
      summary: Get saved leads
      description: Returns leads that have been saved/bookmarked
      responses:
        "200":
          description: Saved leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Update lead status
      description: Update the outreach status of a saved lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLeadStatusResult"

  /leads/{id}/save:
    post:
      operationId: saveLead
      tags: [leads]
      summary: Save a lead
      description: Save or unsave a lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Save status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveLeadResult"

  /leads/{id}/respond:
    post:
      operationId: generateResponse
      tags: [leads]
      summary: Generate outreach response
      description: Generate an AI-style outreach message for a specific lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedResponse"

  /leads/{id}/score-breakdown:
    get:
      operationId: getLeadScoreBreakdown
      tags: [leads]
      summary: Keyword scoring breakdown for a lead
      description: Returns all matched keywords, their individual scores, and which keyword set the final intent score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Score breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreBreakdown"

  /leads/{id}/analyze:
    post:
      operationId: analyzeLead
      tags: [leads]
      summary: AI analysis of a lead
      description: Use AI to analyze the lead's intent, pain level, and recommend the optimal outreach strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadAnalysis"

  /leads/{id}/enrich:
    get:
      operationId: enrichLead
      tags: [leads]
      summary: Enrich a lead
      description: Extract contact info from post text and fetch the author's public platform profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enrichment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichmentData"

  /sources:
    get:
      operationId: getSources
      tags: [leads]
      summary: Get available sources
      description: List all configured lead sources
      responses:
        "200":
          description: Available sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesResponse"

  /keywords:
    get:
      operationId: getKeywords
      tags: [keywords]
      summary: Get all intent keywords
      description: Returns all configured scoring keywords
      responses:
        "200":
          description: List of keywords
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordsResponse"
    post:
      operationId: createKeyword
      tags: [keywords]
      summary: Add a new keyword
      description: Add a new intent keyword with a score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeywordInput"
      responses:
        "201":
          description: Created keyword
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /keywords/reset:
    post:
      operationId: resetKeywords
      tags: [keywords]
      summary: Reset to defaults
      description: Reset all keywords to the default bank
      responses:
        "200":
          description: Keywords reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordsResponse"

  /keywords/test:
    post:
      operationId: testPhrase
      tags: [keywords]
      summary: Test a phrase against keywords
      description: Run a phrase through the scorer and return which keyword matched and the resulting score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestPhraseInput"
      responses:
        "200":
          description: Scoring result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPhraseResult"

  /keywords/{id}:
    patch:
      operationId: updateKeyword
      tags: [keywords]
      summary: Update a keyword
      description: Update a keyword's phrase, score, or enabled state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKeywordInput"
      responses:
        "200":
          description: Updated keyword
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"
    delete:
      operationId: deleteKeyword
      tags: [keywords]
      summary: Delete a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKeywordResult"

  /voice/config:
    get:
      operationId: getVoiceConfig
      tags: [voice]
      summary: Get voice agent business configuration
      responses:
        "200":
          description: Business configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceConfig"
    put:
      operationId: updateVoiceConfig
      tags: [voice]
      summary: Update voice agent business configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVoiceConfigInput"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceConfig"

  /voice/calls/stats:
    get:
      operationId: getVoiceCallStats
      tags: [voice]
      summary: Get aggregated call statistics
      responses:
        "200":
          description: Aggregated call stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceCallStats"

  /voice/calls:
    get:
      operationId: getVoiceCalls
      tags: [voice]
      summary: Get paginated call history
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: direction
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: outcome
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated call history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceCallsResponse"

  /voice/calls/{id}:
    get:
      operationId: getVoiceCall
      tags: [voice]
      summary: Get call detail with full transcript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call detail with transcript
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceCallDetail"

  /voice/analytics:
    get:
      operationId: getVoiceAnalytics
      tags: [voice]
      summary: Get call analytics - hourly distribution and daily volume
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceAnalytics"

  /voice/calls/live:
    get:
      operationId: getVoiceCallsLive
      tags: [voice]
      summary: Get currently in-progress calls
      responses:
        "200":
          description: Live in-progress calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoiceCall"

  /voice/calls/{id}/summarize:
    post:
      operationId: summarizeVoiceCall
      tags: [voice]
      summary: Generate or regenerate AI summary and outcome for a call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated call with summary and outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceCall"

  /voice/outbound:
    post:
      operationId: createOutboundCall
      tags: [voice]
      summary: Initiate an outbound call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutboundCallInput"
      responses:
        "200":
          description: Outbound call initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutboundCallResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Lead:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        text:
          type: string
        url:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        intent_score:
          type: integer
        intent_label:
          type: string
        subreddit:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        created_at:
          type: string
        saved:
          type: boolean
        status:
          type: string
          nullable: true
      required:
        - id
        - source
        - text
        - intent_score
        - intent_label
        - created_at
        - saved

    LeadsResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
        fetched_at:
          type: string
      required:
        - leads
        - total
        - fetched_at

    LeadsStats:
      type: object
      properties:
        total_leads:
          type: integer
        high_intent:
          type: integer
        medium_intent:
          type: integer
        low_intent:
          type: integer
        saved_count:
          type: integer
        by_source:
          type: array
          items:
            $ref: "#/components/schemas/SourceCount"
        avg_score:
          type: number
        last_run:
          type: string
          nullable: true
      required:
        - total_leads
        - high_intent
        - medium_intent
        - low_intent
        - saved_count
        - by_source
        - avg_score

    SourceCount:
      type: object
      properties:
        source:
          type: string
        count:
          type: integer
      required:
        - source
        - count

    ReplyVariant:
      type: object
      properties:
        label:
          type: string
        message:
          type: string
        style:
          type: string
      required:
        - label
        - message
        - style

    GeneratedResponse:
      type: object
      properties:
        message:
          type: string
        lead_id:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ReplyVariant"
      required:
        - message
        - lead_id
        - variants

    UpdateLeadStatusInput:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UpdateLeadStatusResult:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
      required:
        - id
        - status

    SaveLeadResult:
      type: object
      properties:
        saved:
          type: boolean
        lead_id:
          type: string
      required:
        - saved
        - lead_id

    SourceInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        active:
          type: boolean
        description:
          type: string
        count:
          type: integer
      required:
        - id
        - name
        - active
        - description
        - count

    SourcesResponse:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceInfo"
      required:
        - sources

    Keyword:
      type: object
      properties:
        id:
          type: string
        phrase:
          type: string
        score:
          type: integer
        category:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
      required:
        - id
        - phrase
        - score
        - category
        - enabled
        - created_at

    KeywordsResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
        total:
          type: integer
      required:
        - keywords
        - total

    CreateKeywordInput:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        category:
          type: string
      required:
        - phrase
        - score

    UpdateKeywordInput:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        category:
          type: string
        enabled:
          type: boolean

    TestPhraseInput:
      type: object
      properties:
        phrase:
          type: string
      required:
        - phrase

    TestPhraseResult:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        intent_label:
          type: string
        matched_keyword:
          type: string
          nullable: true
        matched_keyword_id:
          type: string
          nullable: true
        all_matches:
          type: array
          items:
            $ref: "#/components/schemas/KeywordMatch"
      required:
        - phrase
        - score
        - intent_label

    KeywordMatch:
      type: object
      properties:
        id:
          type: string
        phrase:
          type: string
        score:
          type: integer
      required:
        - id
        - phrase
        - score

    DeleteKeywordResult:
      type: object
      properties:
        deleted:
          type: boolean
        id:
          type: string
      required:
        - deleted
        - id

    MatchedKeyword:
      type: object
      properties:
        phrase:
          type: string
        score:
          type: integer
        is_primary:
          type: boolean
          description: True if this keyword set the final intent score (highest-scoring match)
      required:
        - phrase
        - score
        - is_primary

    ScoreBreakdown:
      type: object
      properties:
        lead_id:
          type: string
        final_score:
          type: integer
        matched:
          type: array
          items:
            $ref: "#/components/schemas/MatchedKeyword"
        unmatched_count:
          type: integer
          description: Number of active keywords that did NOT match this post
        total_keywords:
          type: integer
        fallback:
          type: boolean
          description: True if no keywords matched and the default score of 3 was used
      required:
        - lead_id
        - final_score
        - matched
        - unmatched_count
        - total_keywords
        - fallback

    LeadAnalysis:
      type: object
      properties:
        lead_id:
          type: string
        summary:
          type: string
        pain_level:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        urgency:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        tech_level:
          type: string
          enum: [NON_TECHNICAL, TECHNICAL, DEVELOPER]
        recommended_channel:
          type: string
          enum: [POST_REPLY, EMAIL, DM]
        recommended_style:
          type: string
          enum: [EMPATHETIC, DIRECT, CURIOSITY]
        reasoning:
          type: string
        key_angles:
          type: array
          items:
            type: string
        avoid:
          type: array
          items:
            type: string
        opening_hook:
          type: string
      required:
        - lead_id
        - summary
        - pain_level
        - urgency
        - tech_level
        - recommended_channel
        - recommended_style
        - reasoning
        - key_angles
        - avoid
        - opening_hook

    SourceProfile:
      type: object
      properties:
        karma:
          type: integer
          nullable: true
        account_age_days:
          type: integer
          nullable: true
        bio:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        profile_url:
          type: string
          nullable: true
      required:
        - karma
        - account_age_days
        - bio
        - website
        - profile_url

    EnrichmentData:
      type: object
      properties:
        lead_id:
          type: string
        emails:
          type: array
          items:
            type: string
        phones:
          type: array
          items:
            type: string
        urls:
          type: array
          items:
            type: string
        company:
          type: string
          nullable: true
        source_profile:
          $ref: "#/components/schemas/SourceProfile"
          nullable: true
      required:
        - lead_id
        - emails
        - phones
        - urls
        - company
        - source_profile

    VoiceConfig:
      type: object
      properties:
        id:
          type: string
        businessName:
          type: string
        businessType:
          type: string
        greeting:
          type: string
        instructions:
          type: string
        hoursJson:
          type: string
        servicesJson:
          type: string
        voice:
          type: string
        transferNumber:
          type: string
          nullable: true
        twilioPhoneNumber:
          type: string
          nullable: true
        twilioAccountSid:
          type: string
          nullable: true
        twilioAuthToken:
          type: string
          nullable: true
        isActive:
          type: boolean
        webhookUrl:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - businessName
        - businessType
        - greeting
        - instructions
        - hoursJson
        - servicesJson
        - voice
        - isActive
        - webhookUrl
        - createdAt
        - updatedAt

    UpdateVoiceConfigInput:
      type: object
      properties:
        businessName:
          type: string
        businessType:
          type: string
        greeting:
          type: string
        instructions:
          type: string
        hoursJson:
          type: string
        servicesJson:
          type: string
        voice:
          type: string
        transferNumber:
          type: string
          nullable: true
        twilioAccountSid:
          type: string
          nullable: true
        twilioAuthToken:
          type: string
          nullable: true
        twilioPhoneNumber:
          type: string
          nullable: true
        isActive:
          type: boolean

    VoiceCall:
      type: object
      properties:
        id:
          type: string
        callSid:
          type: string
        fromNumber:
          type: string
        toNumber:
          type: string
        direction:
          type: string
        status:
          type: string
        durationSeconds:
          type: integer
          nullable: true
        outcome:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        startedAt:
          type: string
        endedAt:
          type: string
          nullable: true
        messageCount:
          type: integer
      required:
        - id
        - callSid
        - fromNumber
        - toNumber
        - direction
        - status
        - startedAt
        - messageCount

    VoiceCallsResponse:
      type: object
      properties:
        calls:
          type: array
          items:
            $ref: "#/components/schemas/VoiceCall"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - calls
        - total
        - page
        - totalPages

    VoiceStatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count

    VoiceOutcomeCount:
      type: object
      properties:
        outcome:
          type: string
        count:
          type: integer
      required:
        - outcome
        - count

    VoiceCallStats:
      type: object
      properties:
        totalCalls:
          type: integer
        todayCalls:
          type: integer
        avgDurationSeconds:
          type: number
          nullable: true
        inboundCount:
          type: integer
        outboundCount:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/VoiceStatusCount"
        byOutcome:
          type: array
          items:
            $ref: "#/components/schemas/VoiceOutcomeCount"
      required:
        - totalCalls
        - todayCalls
        - avgDurationSeconds
        - inboundCount
        - outboundCount
        - byStatus
        - byOutcome

    VoiceMessage:
      type: object
      properties:
        id:
          type: string
        callId:
          type: string
        role:
          type: string
        content:
          type: string
        audioReady:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - callId
        - role
        - content
        - audioReady
        - createdAt

    VoiceCallDetail:
      type: object
      properties:
        call:
          $ref: "#/components/schemas/VoiceCall"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/VoiceMessage"
      required:
        - call
        - messages

    VoiceHourlyCount:
      type: object
      properties:
        hour:
          type: integer
        count:
          type: integer
      required: [hour, count]

    VoiceDailyCount:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
        inbound:
          type: integer
        outbound:
          type: integer
      required: [date, count, inbound, outbound]

    VoiceAnalytics:
      type: object
      properties:
        hourly:
          type: array
          items:
            $ref: "#/components/schemas/VoiceHourlyCount"
        daily:
          type: array
          items:
            $ref: "#/components/schemas/VoiceDailyCount"
        peakHour:
          type: integer
          nullable: true
        missedToday:
          type: integer
      required: [hourly, daily, missedToday]

    CreateOutboundCallInput:
      type: object
      properties:
        toNumber:
          type: string
        purpose:
          type: string
          nullable: true
      required:
        - toNumber

    CreateOutboundCallResult:
      type: object
      properties:
        callSid:
          type: string
        status:
          type: string
        toNumber:
          type: string
      required:
        - callSid
        - status
        - toNumber
